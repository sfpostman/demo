$kind: http-example
name: Unexpected error
request:
  url: "{{baseUrl}}:/books?genre=fugiat amet in aliquip
    Excepteur&checkedOut=fugiat amet in aliquip Excepteur&search=fugiat amet in
    aliquip Excepteur#"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: genre
      value: fugiat amet in aliquip Excepteur
      description: a genre to filter for
    - key: checkedOut
      value: fugiat amet in aliquip Excepteur
      description: a value true or false
    - key: search
      value: fugiat amet in aliquip Excepteur
      description: a search term to match against author or title
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": "error",
        "message": "something"
      }
order: 4000
