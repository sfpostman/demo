$kind: http-example
request:
  url: "{{baseUrl}}:/books/:id#"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: api-key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: 29cd820f-82f9-4b45-a7f4-0924111b5b8a
      description: (Required) the id of a book
  body:
    type: json
    content: |-
      {
        "checkedOut": true
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "message": "You cannot modify books in the permanent collection! Book with id '29cd820f-82f9-4b45-a7f4-0924111b5b89' is in the permanent collection."
      }
order: 4000
