$kind: http-example
request:
  url: "{{baseUrl}}:/books/:id#"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: id
      value: fugiat amet in aliquip Excepteur
      description: (Required) the id of a book
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": "error",
        "message": "something"
      }
order: 3000
