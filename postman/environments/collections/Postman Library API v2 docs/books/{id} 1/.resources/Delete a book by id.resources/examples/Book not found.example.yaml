$kind: http-example
request:
  url: "{{baseUrl}}:/books/:id#"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: api-key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: 29cd820f-82f9-4b45-a7f4-0924111b5b8e
      description: (Required) the id of a book
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "message": "Book with id '29cd820f-82f9-4b45-a7f4-0924111b5b8e' not found"
      }
order: 4000
