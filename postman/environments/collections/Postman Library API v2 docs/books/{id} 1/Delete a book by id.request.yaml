$kind: http-request
url: "{{baseUrl}}:/books/:id#"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: 29f47d22-1062-479d-be58-2d8db3ecb8be
    description: (Required) the id of a book
auth:
  type: apikey
  credentials:
    key: api-key
    value: "{{apiKey}}"
    in: header
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });


      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });


      pm.test("Response body is empty", function () {
          pm.expect(pm.response.text()).to.eql("");
      });


      pm.test("Verify status code is not 403 Forbidden", function () {
          pm.expect(pm.response.code).to.not.eql(403);
      });


      pm.test("Verify status code is not 500 Internal Server Error", function ()
      {
          pm.expect(pm.response.code).to.not.eql(500);
      });
    language: text/javascript
examples: ./.resources/Delete a book by id.resources/examples
order: 3000
