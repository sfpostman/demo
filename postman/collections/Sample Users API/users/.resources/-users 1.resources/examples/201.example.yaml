$kind: http-example
request:
  url: "{{baseUrl}}/users"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "name": "New User",
        "email": "new@example.com",
        "role": "user"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "<integer>",
        "name": "<string>",
        "email": "<string>",
        "role": "<string>",
        "address": {
          "street": "<string>",
          "city": "<string>",
          "zip": "<string>"
        }
      }
order: 1000
