$kind: http-request
url: "{{baseUrl}}:/books#"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: genre
    value: fiction
    disabled: true
    description: a genre to filter for
  - key: checkedOut
    value: "false"
    disabled: true
    description: a value true or false
  - key: search
    value: borges
    disabled: true
    description: a search term to match against author or title
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })


      pm.test('Response time is acceptable', function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      })


      pm.test('Response is an array', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an('array');
      })


      pm.test('Each book has required properties with correct types', function
      () {
          const jsonData = pm.response.json();
          jsonData.forEach(function (book) {
              pm.expect(book).to.have.property('id');
              pm.expect(book).to.have.property('title');
              pm.expect(book).to.have.property('author');
              pm.expect(book).to.have.property('genre');
              pm.expect(book.id).to.be.a('number');
              pm.expect(book.title).to.be.a('string');
              pm.expect(book.author).to.be.a('string');
              pm.expect(book.genre).to.be.a('string');
          });
      })


      pm.test('Content-Type header is application/json', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      })
    language: text/javascript
examples: ./.resources/Get books.resources/examples
order: 2000
