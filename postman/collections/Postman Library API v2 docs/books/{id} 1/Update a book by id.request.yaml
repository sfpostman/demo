$kind: http-request
url: "{{baseUrl}}:/books/:id#"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: 29cd820f-82f9-4b45-a7f4-0924111b5b89
    description: (Required) the id of a book
body:
  type: json
  content: |-
    {
      "checkedOut": true
    }
auth:
  type: apikey
  credentials:
    key: api-key
    value: "{{apiKey}}"
    in: header
scripts:
  - type: afterResponse
    code: >
      
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });


      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });


      pm.test("Response is JSON", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Response body is an object", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("object");
      });


      pm.test("Book has required properties", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("title");
          pm.expect(jsonData).to.have.property("author");
          pm.expect(jsonData).to.have.property("genre");
          pm.expect(jsonData).to.have.property("yearPublished");
          pm.expect(jsonData).to.have.property("checkedOut");
          pm.expect(jsonData).to.have.property("isPermanentCollection");
          pm.expect(jsonData).to.have.property("createdAt");
      });


      pm.test("checkedOut is updated to true", function () {
          const jsonData = pm.response.json();
          const requestBody = JSON.parse(pm.request.body.raw);
          pm.expect(jsonData.checkedOut).to.eql(requestBody.checkedOut);
      });


      pm.test("Book ID matches request", function () {
          const jsonData = pm.response.json();
          const requestedId = pm.request.url.path[pm.request.url.path.length - 1];
          pm.expect(jsonData.id).to.eql(requestedId);
      });


      pm.test("Data types are correct", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.be.a("string");
          pm.expect(jsonData.title).to.be.a("string");
          pm.expect(jsonData.author).to.be.a("string");
          pm.expect(jsonData.genre).to.be.a("string");
          pm.expect(jsonData.yearPublished).to.be.a("number");
          pm.expect(jsonData.checkedOut).to.be.a("boolean");
      });
    language: text/javascript
examples: ./.resources/Update a book by id.resources/examples
order: 2000
