$kind: http-example
name: Bad request
request:
  url: "{{baseUrl}}:/books/:id#"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: api-key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: 29cd820f-82f9-4b45-a7f4-0924111b5b89
      description: (Required) the id of a book
  body:
    type: json
    content: |-
      {
        "checkedOut": "foo"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "body/checkedOut must be boolean",
        "errors": [
          {
            "instancePath": "/checkedOut",
            "schemaPath": "#/properties/checkedOut/type",
            "keyword": "type",
            "params": {
              "type": "boolean"
            },
            "message": "must be boolean"
          }
        ]
      }
order: 8000
