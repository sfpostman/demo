$kind: http-example
name: Unauthorized
request:
  url: "{{baseUrl}}:/books/:id#"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: api-key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: id
      value: 29cd820f-82f9-4b45-a7f4-0924111b5b89
      description: (Required) the id of a book
  body:
    type: json
    content: |-
      {
        "checkedOut": true
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "message": "Invalid or missing credentials. Make sure you add 'api-key' to the request headers with a valid value"
      }
order: 9000
