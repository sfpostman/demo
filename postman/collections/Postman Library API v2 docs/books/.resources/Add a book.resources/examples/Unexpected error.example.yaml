$kind: http-example
request:
  url: "{{baseUrl}}/books"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: api-key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "title": "The Four Agreements",
        "author": "don Miguel Ruiz",
        "genre": "self-help",
        "yearPublished": 1997
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": "error",
        "message": "something"
      }
order: 4000
