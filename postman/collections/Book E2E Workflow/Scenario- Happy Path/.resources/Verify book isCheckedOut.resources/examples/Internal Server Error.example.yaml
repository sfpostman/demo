$kind: http-example
request:
  url: "{{url}}:/books/:id"
  method: GET
  pathVariables:
    id: "{{bookId}}"
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "error": {
              "code": 500,
              "message": "Internal Server Error"
          }
      }
order: 2000
