$kind: http-example
request:
  url: "{{url}}/books"
  method: POST
  body:
    type: json
    content: |-
      {
          "title": {{bookId}},
          "author":{{bookTitle}},
          "genre": "fiction",
          "yearPublished": 1967
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "error": {
              "code": 500,
              "message": "Internal Server Error"
          }
      }
order: 2000
