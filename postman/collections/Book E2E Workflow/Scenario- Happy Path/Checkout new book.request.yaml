$kind: http-request
url: "{{url}}:/books/:id"
method: PATCH
headers:
  x-mock-response-code: "200"
pathVariables:
  id: "{{bookId}}"
body:
  type: json
  content: ""
scripts:
  - type: afterResponse
    code: >-
      
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });



      pm.test("Response has required fields", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData).to.have.all.keys('id', 'title', 'author', 'genre', 'yearPublished', 'checkedOut', 'isPermanentCollection', 'createdAt');
      });



      pm.test("Title is a non-empty string", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.title).to.exist.and.to.be.a('string').and.to.have.lengthOf.at.least(1, "Value should not be empty");
      });



      pm.test("Year published is a valid year", function () {
          const responseData = pm.response.json();
          const currentYear = new Date().getFullYear();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.yearPublished).to.be.a('number').and.to.be.greaterThan(0).and.to.be.at.most(currentYear);
      });



      pm.test("Checked out status is a boolean value", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.checkedOut).to.be.a('boolean');
      });


      pm.test('PATCH /books/:id - Status code is 200', function () {
          pm.response.to.have.status(200);
      })


      pm.test('PATCH /books/:id - Content-Type is JSON', function () {
          pm.response.to.have.header('Content-Type');
          pm.expect(pm.response.headers.get('Content-Type')).to.match(/application\/json/i);
      })


      pm.test('PATCH /books/:id - Response has expected fields', function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an('object');
          pm.expect(jsonData).to.have.property('id');
          pm.expect(jsonData).to.have.property('checkedOut');
          pm.expect(jsonData.checkedOut).to.be.a('boolean');
      })


      pm.test('PATCH /books/:id - Status change: checkedOut is true', function
      () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.checkedOut).to.eql(true);
      })


      pm.test('PATCH /books/:id - id matches collection variable bookId (if
      set)', function () {
          var jsonData = pm.response.json();
          var expectedId = pm.collectionVariables.get('bookId');
          if (expectedId) {
              pm.expect(String(jsonData.id)).to.eql(String(expectedId));
          } else {
              pm.expect(true).to.eql(true);
          }
      })


      pm.test('PATCH /books/:id - Negative check: does not return an error
      object', function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.not.have.property('error');
          pm.expect(jsonData).to.not.have.property('errors');
      })
    language: text/javascript
examples: ./.resources/Checkout new book.resources/examples
order: 4000
