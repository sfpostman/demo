openapi: 3.0.0
info:
  title: NASA
  version: 1.0.0
  description: ''
servers:
  - url: https://api.nasa.gov
paths:
  /planetary/apod:
    get:
      summary: planet
      parameters:
        - name: api_key
          in: query
          schema:
            type: string
          example: '{{NASA}}'
      responses: {}
  /neo/rest/v1/feed:
    get:
      summary: neo
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
          example: '2026-01-01'
        - name: end_date
          in: query
          schema:
            type: string
          example: '2026-01-07'
        - name: api_key
          in: query
          schema:
            type: string
          example: '{{NASA}}'
      responses: {}
